services:
  - type: web
    name: tasksnap-otp-api
    runtime: node
    rootDir: functions
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: RESET_EMAIL_USER
        sync: false
      - key: RESET_EMAIL_APP_PASSWORD
        sync: false
      - key: RESET_EMAIL_FROM
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
